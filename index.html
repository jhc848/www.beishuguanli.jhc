<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背书管理系统</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* ===== 原有样式保留，移除开场动画 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "微软雅黑", sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f0f4ff 0%, #e6efff 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.12);
            padding: 40px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            color: #2d3748;
            font-size: 38px;
            font-weight: 700;
            margin-bottom: 12px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.05);
        }
        
        .header p {
            color: #718096;
            font-size: 16px;
            line-height: 1.6;
        }
        
        .reminder {
            background: #fef3c7;
            color: #92400e;
            padding: 12px 20px;
            border-radius: 12px;
            margin: 12px 0;
            font-weight: 500;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.15);
            animation: pulse 1.2s infinite;
        }
        
        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
            }
        }
        
        /* 同步面板 - 始终显示 */
        .sync-panel {
            background: #f8fafc;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: all 0.3s ease;
            display: block;
        }
        
        .sync-panel:hover {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }
        
        .sync-panel.empty-class {
            background: linear-gradient(135deg, #fef9e6, #fff4e0);
            border-color: #fbbf24;
        }
        
        .class-section {
            margin-bottom: 35px;
        }
        
        .class-tabs {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .class-tab {
            padding: 15px 30px;
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            color: #4a5568;
            font-size: 15px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .class-tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: all 0.4s ease;
        }
        
        .class-tab:hover {
            background: #edf2f7;
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.12);
        }
        
        .class-tab:hover::before {
            left: 100%;
        }
        
        .class-tab.active {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border-color: #4f46e5;
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.3);
            transform: translateY(-3px);
        }
        
        .delete-class-btn {
            background: rgba(239, 68, 68, 0.8);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
        }
        
        .delete-class-btn:hover {
            background: #ef4444;
            transform: scale(1.05);
        }
        
        .class-tab.active .delete-class-btn {
            background: rgba(255, 255, 255, 0.3);
            color: white;
        }
        
        .class-tab.active .delete-class-btn:hover {
            background: #ef4444;
        }
        
        .add-class-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            font-size: 15px;
            position: relative;
            overflow: hidden;
            animation: pulse 2s infinite;
        }
        
        .add-class-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: all 0.4s ease;
        }
        
        .add-class-btn:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 12px 25px rgba(16, 185, 129, 0.3);
            animation: none;
        }
        
        .add-class-btn:hover::before {
            left: 100%;
        }
        
        .control-panel {
            background: #f8fafc;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 35px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.06);
            display: none;
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: all 0.3s ease;
        }
        
        .control-panel:hover {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }
        
        .no-class-tip {
            text-align: center;
            color: #718096;
            padding: 60px 0;
            font-size: 18px;
            line-height: 1.8;
        }
        
        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .input-group label {
            font-size: 14px;
            color: #4a5568;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        input, select, button {
            padding: 15px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            font-size: 15px;
            transition: all 0.2s ease;
            outline: none;
        }
        
        input:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 5px rgba(79, 70, 229, 0.15);
            transform: translateY(-4px) scale(1.02);
        }
        
        .file-upload-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            cursor: pointer;
            height: 58px;
        }
        
        .file-upload-input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            cursor: pointer;
            z-index: 10;
        }
        
        .file-upload-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            height: 100%;
            padding: 0 20px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border-radius: 14px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s ease;
            cursor: pointer;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        .file-upload-btn:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 12px 25px rgba(59, 130, 246, 0.3);
        }
        
        .file-name {
            margin-top: 8px;
            font-size: 13px;
            color: #718096;
            padding: 8px 12px;
            background: #f1f5f9;
            border-radius: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        button {
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            border: none;
            position: relative;
            overflow: hidden;
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.15);
        }
        
        button:hover::before {
            left: 100%;
        }
        
        /* 新增：点击动效 */
        button:active {
            transform: scale(0.95) translateY(2px);
            transition: transform 0.05s ease;
        }
        
        /* 针对班级标签的点击动效 */
        .class-tab:active {
            transform: scale(0.97) translateY(-1px);
        }
        
        /* 针对统计卡片的点击动效 */
        .stat-card:active {
            transform: scale(0.98);
        }
        
        /* 针对学生列表项的点击动效（按钮已有，列表项可选） */
        .student-item:active, .now-item:active {
            transform: scale(0.99);
        }
        
        .btn-primary { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; }
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .btn-warning { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
        .btn-info { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
        .btn-secondary { background: linear-gradient(135deg, #94a3b8, #64748b); color: white; }
        .btn-purple { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; }
        .btn-sync { background: linear-gradient(135deg, #ec4899, #db2777); color: white; }

        .stats-bar {
            display: flex;
            gap: 20px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        
        .stat-card {
            flex: 1;
            min-width: 140px;
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
            text-align: center;
            transition: all 0.2s ease;
            border: 1px solid rgba(226, 232, 240, 0.5);
            cursor: default;
        }
        
        .stat-card:hover {
            transform: translateY(-8px) scale(1.08);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }
        
        .stat-card h4 {
            font-size: 14px;
            color: #718096;
            margin-bottom: 12px;
        }
        
        .stat-card .num {
            font-size: 28px;
            font-weight: 700;
            color: #2d3748;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        
        .status-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
            display: none;
        }
        
        .status-now {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            display: none;
        }
        
        .status-card, .now-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(226, 232, 240, 0.5);
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
        }
        
        .status-card:hover, .now-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }
        
        .status-card h3, .now-card h3 {
            font-size: 20px;
            color: #2d3748;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            flex-shrink: 0;
        }
        
        .status-card h3 span, .now-card h3 span {
            background: #f0f4ff;
            color: #4f46e5;
            padding: 6px 15px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.1);
        }
        
        .student-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
            max-height: 500px;
        }
        
        .now-list {
            max-height: 160px;
            overflow-y: auto;
            padding-right: 8px;
        }
        
        .student-list::-webkit-scrollbar, .now-list::-webkit-scrollbar {
            width: 8px;
        }
        
        .student-list::-webkit-scrollbar-track, .now-list::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }
        
        .student-list::-webkit-scrollbar-thumb, .now-list::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        
        .student-list::-webkit-scrollbar-thumb:hover, .now-list::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        
        .student-item, .now-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            background: #f8fafc;
            margin-bottom: 12px;
            border-radius: 16px;
            transition: all 0.2s ease;
            border: 1px solid rgba(226, 232, 240, 0.5);
        }
        
        .now-item {
            background: #fef3c7;
            border: 1px solid #f59e0b;
        }
        
        .student-item:hover {
            background: #f1f5f9;
            transform: translateX(12px) scale(1.03);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        .now-item:hover {
            background: #fee7a0;
            transform: translateX(12px) scale(1.03);
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.15);
        }
        
        .student-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }
        
        .student-name {
            font-weight: 700;
            color: #2d3748;
            font-size: 16px;
        }
        
        .student-num {
            font-size: 13px;
            color: #718096;
        }
        
        .student-remark {
            font-size: 12px;
            color: #4f46e5;
            background: #e0e7ff;
            padding: 2px 8px;
            border-radius: 12px;
            display: inline-block;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .student-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        
        .student-actions button {
            padding: 10px 15px;
            font-size: 13px;
            border-radius: 10px;
        }
        
        .empty-tip {
            text-align: center;
            color: #a0aec0;
            padding: 80px 0;
            font-size: 16px;
            line-height: 1.8;
        }
        
        .empty-tip-now {
            text-align: center;
            color: #a0aec0;
            padding: 30px 0;
            font-size: 16px;
        }
        
        .search-box {
            margin-bottom: 20px;
            flex-shrink: 0;
        }
        
        .search-box input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            font-size: 15px;
            transition: all 0.2s ease;
        }
        
        .search-box input:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 5px rgba(79, 70, 229, 0.15);
            transform: translateY(-4px) scale(1.02);
        }
        
        .record-section {
            background: #f8fafc;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 35px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.06);
            display: none;
            border: 1px solid rgba(226, 232, 240, 0.5);
        }
        
        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .record-header h3 {
            color: #2d3748;
            font-size: 20px;
            font-weight: 700;
        }
        
        .record-header-actions {
            display: flex;
            gap: 10px;
        }
        
        .record-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .record-tab {
            padding: 10px 20px;
            background: #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .record-tab.active {
            background: #4f46e5;
            color: white;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.2);
        }
        
        .record-tab:hover {
            transform: translateY(-6px) scale(1.05);
        }
        
        .record-tab:active {
            transform: scale(0.96) translateY(2px);
        }
        
        .record-content {
            max-height: 350px;
            overflow-y: auto;
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(226, 232, 240, 0.5);
        }
        
        .random-panel {
            background: #f8fafc;
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0 20px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: all 0.3s ease;
            display: none;
        }
        
        .random-panel:hover {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }
        
        .random-left, .random-right {
            background: white;
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.02);
            transition: all 0.3s ease;
        }
        
        .random-left:hover, .random-right:hover {
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.08);
        }
        
        .random-left h4, .random-right h4 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .random-student-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #f9f9fc;
            border-radius: 14px;
            margin-bottom: 10px;
            border: 1px solid #eef2f6;
        }
        
        .random-add-btn {
            padding: 6px 16px;
            background: #10b981;
            color: white;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .random-add-btn:hover {
            background: #059669;
            transform: scale(1.05);
        }
        
        .random-add-btn:active {
            transform: scale(0.94);
        }
        
        .random-add-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
        }
        
        .random-right-top {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .random-right-top input {
            width: 100px;
            text-align: center;
            padding: 12px;
        }
        
        .random-drawn-list {
            max-height: 200px;
            overflow-y: auto;
            margin: 15px 0;
            background: #f1f5f9;
            border-radius: 14px;
            padding: 12px;
        }
        
        .random-drawn-tag {
            background: #4f46e5;
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            display: inline-block;
            margin: 4px;
        }
        
        .end-task-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            margin-top: 30px;
            transition: all 0.2s ease;
            overflow: hidden;
            animation: pulse 2s infinite 1s;
            display: none;
        }
        
        .end-task-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: all 0.3s ease;
        }
        
        .end-task-btn:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 35px rgba(239, 68, 68, 0.3);
            animation: none;
        }
        
        .end-task-btn:hover::before {
            left: 100%;
        }
        
        .end-task-btn:active {
            transform: scale(0.97) translateY(2px);
        }
        
        .sync-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .sync-header h3 {
            color: #2d3748;
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .sync-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .sync-input-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .sync-input-group input {
            flex: 1;
            min-width: 250px;
            padding: 15px 20px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            font-family: monospace;
            font-size: 14px;
        }
        
        .sync-input-group input:focus {
            border-color: #ec4899;
            box-shadow: 0 0 0 5px rgba(236, 72, 153, 0.15);
        }
        
        .sync-tip {
            margin-top: 10px;
            color: #718096;
            font-size: 13px;
            padding: 8px 12px;
            background: #f1f5f9;
            border-radius: 8px;
        }
        
        .sync-tip.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .sync-tip.error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        @media (max-width: 1200px) {
            .status-section { grid-template-columns: 1fr 1fr; }
        }
        
        @media (max-width: 900px) {
            .status-section { grid-template-columns: 1fr; }
            .input-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 背书管理系统</h1>
            <p id="headerDesc">背书管理系统开发部门对其保留所有权利</p>
        </div>
        
        <div id="reminderBox" style="text-align: center; margin-bottom: 20px;"></div>
        
        <div class="sync-panel" id="syncPanel">
            <div class="sync-header">
                <h3>🔄 跨设备数据同步</h3>
                <div class="sync-buttons">
                    <button class="btn-purple" id="generateSyncKeyBtn">🔑 生成同步密钥</button>
                    <button class="btn-sync" id="showSyncInputBtn">📱 同步数据</button>
                </div>
            </div>
            <div id="syncInputArea" style="display: none;">
                <div class="sync-input-group">
                    <input type="text" id="syncKeyInput" placeholder="请输入同步密钥..." autocomplete="off">
                    <button class="btn-success" id="importSyncKeyBtn">导入</button>
                    <button class="btn-secondary" id="cancelSyncBtn">取消</button>
                </div>
                <div class="sync-tip">提示：粘贴从另一台设备生成的密钥，可选择覆盖或合并数据</div>
                <div id="syncConfirmArea" style="display: none; margin-top: 15px;">
                    <div class="sync-tip" id="syncPreviewInfo"></div>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <button class="btn-primary" id="confirmOverwriteSync">覆盖当前数据</button>
                        <button class="btn-info" id="confirmMergeSync">合并数据</button>
                        <button class="btn-secondary" id="cancelConfirmSync">取消</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="class-section">
            <div class="class-tabs" id="classTabs">
                <button class="add-class-btn" id="addClassBtn">+ 新增班级</button>
            </div>
        </div>
        <div class="no-class-tip" id="noClassTip">暂无班级，请点击上方「新增班级」按钮创建第一个班级</div>
        <div class="control-panel" id="controlPanel">
            <div class="input-grid">
                <div class="input-group"><label>学生姓名</label><input type="text" id="studentName" placeholder="请输入学生姓名" autocomplete="off"></div>
                <div class="input-group"><label>自定义学号（可选）</label><input type="number" id="customNum" placeholder="留空自动编号" autocomplete="off"></div>
                <div class="input-group"><label>Excel导入</label><div class="file-upload-wrapper"><input type="file" id="excelFile" accept=".xlsx,.xls" class="file-upload-input"><button type="button" class="file-upload-btn">📤 选择Excel文件</button><div class="file-name" id="fileName">未选择文件</div></div></div>
            </div>
            <div class="btn-group">
                <button class="btn-primary" id="addStudentBtn">手动添加</button>
                <button class="btn-success" id="importExcelBtn">导入Excel</button>
                <button class="btn-info" id="exportExcelBtn">导出数据</button>
                <button class="btn-warning" id="resetBtn">重置班级</button>
                <button class="btn-danger" id="clearAllBtn">清空所有</button>
            </div>
            <div class="stats-bar">
                <div class="stat-card"><h4>总人数</h4><div class="num" id="totalNum">0</div></div>
                <div class="stat-card"><h4>未背书</h4><div class="num" id="noReciteNum">0</div></div>
                <div class="stat-card"><h4>排队中</h4><div class="num" id="queueNum">0</div></div>
                <div class="stat-card"><h4>正在背书</h4><div class="num" id="recitingNum">0</div></div>
                <div class="stat-card"><h4>已完成</h4><div class="num" id="doneNum">0</div></div>
            </div>
        </div>
        
        <div class="random-panel" id="randomPanel" style="display: none;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px;">
                <div class="random-left">
                    <h4>📋 所有未背书学生 <span id="randomLeftCount"></span></h4>
                    <div id="randomLeftList" style="max-height: 300px; overflow-y: auto;"></div>
                </div>
                <div class="random-right">
                    <div class="random-right-top">
                        <h4>🎲 抽取设置</h4>
                        <input type="number" id="randomCountInput" min="1" value="1" placeholder="人数">
                        <button class="btn-purple" id="doRandomBtn">开始抽取</button>
                        <button class="btn-success" id="replaceByRandomBtn">✅ 替换未背书</button>
                    </div>
                    <div><strong>已抽取名单</strong> <span id="drawnCount">0</span></div>
                    <div class="random-drawn-list" id="randomDrawnList"></div>
                    <button class="btn-danger" id="clearDrawnBtn">清空抽取</button>
                </div>
            </div>
        </div>
        
        <div class="status-now" id="statusNow"><div class="now-card"><h3>正在背书 <span id="recitingCount">0人</span></h3><div class="now-list" id="recitingList"></div></div></div>
        
        <div class="status-section" id="statusSection">
            <div class="status-card"><h3>未背书 <span id="noReciteCount">0人</span></h3><div class="search-box"><input type="text" id="searchNoRecite" placeholder="搜索姓名/学号"></div><div class="student-list" id="noReciteList"></div></div>
            <div class="status-card"><h3>排队中 <span id="queueCount">0人</span></h3><div class="search-box"><input type="text" id="searchQueue" placeholder="搜索姓名/学号"></div><div class="student-list" id="queueList"></div></div>
            <div class="status-card"><h3>已完成 <span id="doneCount">0人</span></h3><div class="search-box"><input type="text" id="searchDone" placeholder="搜索姓名/学号"></div><div class="student-list" id="doneList"></div></div>
        </div>
        
        <div class="record-section" id="recordSection"><div class="record-header"><h3>📜 背书记录</h3><div class="record-header-actions"><button class="btn-danger" id="clearRecordsBtn">清空所有记录</button></div></div><div class="record-tabs" id="recordTabs"></div><div class="record-content" id="recordContent"></div></div>
        <button class="end-task-btn" id="endTaskBtn">🚩 结束当日背书任务</button>
    </div>
    <script>
        (function() {
            let classData = JSON.parse(localStorage.getItem('背书系统数据')) || {};
            let recordData = JSON.parse(localStorage.getItem('背书记录数据')) || {};
            let currentClass = "";
            let currentRecordId = "";
            let pendingSyncData = null;
            let drawnStudents = [];
            
            // DOM 元素
            const classTabs = document.getElementById("classTabs");
            const addClassBtn = document.getElementById("addClassBtn");
            const studentName = document.getElementById("studentName");
            const customNum = document.getElementById("customNum");
            const addStudentBtn = document.getElementById("addStudentBtn");
            const excelFile = document.getElementById("excelFile");
            const fileName = document.getElementById("fileName");
            const importExcelBtn = document.getElementById("importExcelBtn");
            const exportExcelBtn = document.getElementById("exportExcelBtn");
            const resetBtn = document.getElementById("resetBtn");
            const clearAllBtn = document.getElementById("clearAllBtn");
            const noClassTip = document.getElementById("noClassTip");
            const controlPanel = document.getElementById("controlPanel");
            const statusNow = document.getElementById("statusNow");
            const statusSection = document.getElementById("statusSection");
            const reminderBox = document.getElementById("reminderBox");
            const recordSection = document.getElementById("recordSection");
            const recordTabs = document.getElementById("recordTabs");
            const recordContent = document.getElementById("recordContent");
            const clearRecordsBtn = document.getElementById("clearRecordsBtn");
            const endTaskBtn = document.getElementById("endTaskBtn");
            const syncPanelDiv = document.getElementById("syncPanel");
            const generateSyncKeyBtn = document.getElementById("generateSyncKeyBtn");
            const showSyncInputBtn = document.getElementById("showSyncInputBtn");
            const syncInputArea = document.getElementById("syncInputArea");
            const syncKeyInput = document.getElementById("syncKeyInput");
            const importSyncKeyBtn = document.getElementById("importSyncKeyBtn");
            const cancelSyncBtn = document.getElementById("cancelSyncBtn");
            const syncConfirmArea = document.getElementById("syncConfirmArea");
            const syncPreviewInfo = document.getElementById("syncPreviewInfo");
            const confirmOverwriteSync = document.getElementById("confirmOverwriteSync");
            const confirmMergeSync = document.getElementById("confirmMergeSync");
            const cancelConfirmSync = document.getElementById("cancelConfirmSync");
            const randomPanel = document.getElementById("randomPanel");
            const randomLeftList = document.getElementById("randomLeftList");
            const randomCountInput = document.getElementById("randomCountInput");
            const doRandomBtn = document.getElementById("doRandomBtn");
            const replaceByRandomBtn = document.getElementById("replaceByRandomBtn");
            const randomDrawnList = document.getElementById("randomDrawnList");
            const clearDrawnBtn = document.getElementById("clearDrawnBtn");
            const randomLeftCount = document.getElementById("randomLeftCount");
            const drawnCountSpan = document.getElementById("drawnCount");
            const noReciteList = document.getElementById("noReciteList");
            const queueList = document.getElementById("queueList");
            const recitingList = document.getElementById("recitingList");
            const doneList = document.getElementById("doneList");
            const searchNoRecite = document.getElementById("searchNoRecite");
            const searchQueue = document.getElementById("searchQueue");
            const searchDone = document.getElementById("searchDone");
            const totalNum = document.getElementById("totalNum");
            const noReciteNum = document.getElementById("noReciteNum");
            const queueNum = document.getElementById("queueNum");
            const recitingNum = document.getElementById("recitingNum");
            const doneNum = document.getElementById("doneNum");
            const noReciteCount = document.getElementById("noReciteCount");
            const queueCount = document.getElementById("queueCount");
            const recitingCount = document.getElementById("recitingCount");
            const doneCount = document.getElementById("doneCount");

            function sortByNum(arr) { return arr.sort((a,b) => a.num - b.num); }
            function saveData() { localStorage.setItem('背书系统数据', JSON.stringify(classData)); localStorage.setItem('背书记录数据', JSON.stringify(recordData)); }
            
            function renderClassTabs() {
                while (classTabs.children.length > 1) classTabs.removeChild(classTabs.children[0]);
                Object.keys(classData).forEach(cls => {
                    const tab = document.createElement("div");
                    tab.className = `class-tab ${cls === currentClass ? 'active' : ''}`;
                    tab.dataset.class = cls;
                    tab.innerHTML = `${cls}<button class="delete-class-btn" data-class="${cls}">🗑️ 删除</button>`;
                    classTabs.insertBefore(tab, addClassBtn);
                    const deleteBtn = tab.querySelector('.delete-class-btn');
                    deleteBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (confirm(`确定删除班级「${cls}」吗？该班级的所有学生和记录将被删除！`)) {
                            delete classData[cls];
                            delete recordData[cls];
                            if (currentClass === cls) currentClass = Object.keys(classData)[0] || "";
                            saveData();
                            renderClassTabs();
                            checkClassExists();
                            renderStudentList();
                            updateStats();
                            checkReminder();
                            renderRecordTabs();
                            renderRandomPanel();
                        }
                    });
                });
            }
            
            function checkClassExists() {
                const hasClass = Object.keys(classData).length > 0;
                noClassTip.style.display = hasClass ? 'none' : 'block';
                controlPanel.style.display = hasClass ? 'block' : 'none';
                statusNow.style.display = hasClass ? 'block' : 'none';
                statusSection.style.display = hasClass ? 'grid' : 'none';
                recordSection.style.display = hasClass ? 'block' : 'none';
                endTaskBtn.style.display = hasClass ? 'block' : 'none';
                randomPanel.style.display = hasClass ? 'block' : 'none';
                if (syncPanelDiv) {
                    if (!hasClass) syncPanelDiv.classList.add('empty-class');
                    else syncPanelDiv.classList.remove('empty-class');
                }
            }
            
            function addClass() {
                const className = prompt("请输入新班级名称：");
                if (className && className.trim() && !classData[className.trim()]) {
                    const cls = className.trim();
                    classData[cls] = { noRecite: [], queue: [], reciting: [], done: [], maxNum: 0 };
                    currentClass = cls;
                    saveData();
                    renderClassTabs();
                    checkClassExists();
                    renderStudentList();
                    updateStats();
                    checkReminder();
                    renderRandomPanel();
                } else if (classData[className?.trim()]) alert("班级已存在！");
                else if (!className?.trim()) alert("班级名称不能为空！");
            }
            
            function addStudent() {
                if (!currentClass) return alert("请先选择班级！");
                const name = studentName.value.trim();
                if (!name) return alert("姓名不能为空！");
                const classInfo = classData[currentClass];
                const num = customNum.value.trim() ? parseInt(customNum.value) : (classInfo.maxNum + 1);
                const exists = [...classInfo.noRecite, ...classInfo.queue, ...classInfo.reciting, ...classInfo.done].some(s => s.num === num);
                if (exists) return alert(`学号${num}已存在！`);
                classInfo.noRecite.push({ name, num });
                classInfo.maxNum = Math.max(classInfo.maxNum, num);
                classInfo.noRecite = sortByNum(classInfo.noRecite);
                saveData();
                studentName.value = ""; customNum.value = "";
                renderStudentList(); updateStats(); checkReminder(); renderRandomPanel();
            }
            
            function importExcel() {
                if (!currentClass) return alert("请先选择班级！");
                const file = excelFile.files[0];
                if (!file) return alert("请选择文件！");
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const sheet = workbook.Sheets[workbook.SheetNames[0]];
                        const json = XLSX.utils.sheet_to_json(sheet);
                        if (!json.length) return alert("无数据");
                        const classInfo = classData[currentClass];
                        let success = 0, fail = 0;
                        json.forEach(item => {
                            const name = item.姓名 || item.名称 || item.学生姓名 || '';
                            const numRaw = item.学号 || item.编号 || item.自定义学号 || '';
                            if (!name.trim()) { fail++; return; }
                            const studentNum = numRaw ? parseInt(numRaw) : (classInfo.maxNum + 1 + success);
                            const exists = [...classInfo.noRecite, ...classInfo.queue, ...classInfo.reciting, ...classInfo.done].some(s => s.num === studentNum);
                            if (exists) { fail++; return; }
                            classInfo.noRecite.push({ name: name.trim(), num: studentNum });
                            classInfo.maxNum = Math.max(classInfo.maxNum, studentNum);
                            success++;
                        });
                        classInfo.noRecite = sortByNum(classInfo.noRecite);
                        saveData();
                        renderStudentList(); updateStats(); checkReminder(); renderRandomPanel();
                        alert(`导入成功：${success}，失败：${fail}`);
                        excelFile.value = ""; fileName.textContent = "未选择文件";
                    } catch { alert("解析失败"); }
                };
                reader.readAsArrayBuffer(file);
            }
            
            function exportExcel() { 
                if (!currentClass) return alert("请选择班级"); 
                const info = classData[currentClass]; 
                const all = [...info.noRecite.map(s=>({...s,状态:'未背书'})), ...info.queue.map(s=>({...s,状态:'排队中'})), ...info.reciting.map(s=>({...s,状态:'正在背书'})), ...info.done.map(s=>({...s,状态:'已完成'}))].sort((a,b)=>a.num-b.num); 
                if(!all.length) return alert("无数据"); 
                XLSX.writeFile(XLSX.utils.book_new(XLSX.utils.json_to_sheet(all), currentClass), `${currentClass}_背书数据.xlsx`); 
            }
            
            // 修改重置班级：所有学生归为未背书，不删除学生
            function resetClass() {
                if (!currentClass) return;
                if (!confirm(`重置【${currentClass}】？所有学生将回到未背书状态，排队/正在背书/已完成状态将被清空。`)) return;
                const classInfo = classData[currentClass];
                const allStudents = [
                    ...classInfo.noRecite,
                    ...classInfo.queue,
                    ...classInfo.reciting,
                    ...classInfo.done
                ];
                const unique = {};
                allStudents.forEach(s => unique[s.num] = s);
                classInfo.noRecite = sortByNum(Object.values(unique));
                classInfo.queue = [];
                classInfo.reciting = [];
                classInfo.done = [];
                drawnStudents = [];
                saveData();
                renderStudentList(); updateStats(); checkReminder(); renderRandomPanel();
                alert("班级已重置，所有学生回到未背书状态。");
            }
            
            function clearAll() { 
                if (confirm("清空所有班级？")) { 
                    classData = {}; 
                    currentClass = ""; 
                    drawnStudents = []; 
                    saveData(); 
                    renderClassTabs(); 
                    checkClassExists(); 
                    renderStudentList(); 
                    updateStats(); 
                    checkReminder(); 
                    renderRandomPanel(); 
                    syncInputArea.style.display = "none";
                    syncConfirmArea.style.display = "none";
                    syncKeyInput.value = "";
                    pendingSyncData = null;
                } 
            }
            
            // 修改结束任务：记录状态后，将所有学生归为未背书，不删除学生
            function endTask() { 
                if (!currentClass) return;
                if (!confirm(`结束【${currentClass}】今日任务？\n\n系统将保存当前状态为记录，然后将所有学生调整为未背书状态。`)) return;
                const c = classData[currentClass];
                const today = new Date(); 
                const dateStr = `${today.getFullYear()}-${(today.getMonth()+1).toString().padStart(2,'0')}-${today.getDate().toString().padStart(2,'0')}`;
                const timeStr = `${today.getHours().toString().padStart(2,'0')}:${today.getMinutes().toString().padStart(2,'0')}`;
                const recordId = `${currentClass}_${dateStr}_${timeStr}`;
                const recordInfo = {
                    className: currentClass, 
                    date: dateStr, 
                    time: timeStr,
                    total: c.noRecite.length + c.queue.length + c.reciting.length + c.done.length,
                    done: c.done.length,
                    unfinished: c.noRecite.length + c.queue.length + c.reciting.length,
                    details: { 
                        noRecite: [...c.noRecite], 
                        queue: [...c.queue], 
                        reciting: [...c.reciting], 
                        done: [...c.done] 
                    },
                    picked: drawnStudents.slice()
                };
                if (!recordData[currentClass]) recordData[currentClass] = [];
                recordData[currentClass].unshift({ id: recordId, ...recordInfo });
                if (recordData[currentClass].length > 15) recordData[currentClass] = recordData[currentClass].slice(0,15);
                
                // 将所有学生归为未背书
                const allStudents = [
                    ...c.noRecite,
                    ...c.queue,
                    ...c.reciting,
                    ...c.done
                ];
                const unique = {};
                allStudents.forEach(s => unique[s.num] = s);
                c.noRecite = sortByNum(Object.values(unique));
                c.queue = [];
                c.reciting = [];
                c.done = [];
                drawnStudents = [];
                
                saveData();
                renderStudentList(); 
                updateStats(); 
                checkReminder(); 
                renderRecordTabs(); 
                renderRandomPanel();
                alert(`任务结束，记录已保存。当前班级所有学生已调整为未背书状态。`);
            }
            
            function renderStudentList() {
                if (!currentClass) return;
                const classInfo = classData[currentClass];
                classInfo.noRecite = sortByNum(classInfo.noRecite);
                classInfo.queue = sortByNum(classInfo.queue);
                classInfo.reciting = sortByNum(classInfo.reciting);
                classInfo.done = sortByNum(classInfo.done);
                const filter = (list, search) => list.filter(item => item.name.toLowerCase().includes(search.toLowerCase()) || item.num.toString().includes(search));
                const noFilter = filter(classInfo.noRecite, searchNoRecite.value);
                const queueFilter = filter(classInfo.queue, searchQueue.value);
                const doneFilter = filter(classInfo.done, searchDone.value);
                renderList(noReciteList, noFilter, 'noRecite', [{ text: '加入排队', action: 'toQueue', cls: 'btn-info' },{ text: '开始背书', action: 'toReciting', cls: 'btn-warning' },{ text: '标记完成', action: 'toDone', cls: 'btn-success' },{ text: '删除', action: 'delete', cls: 'btn-danger' }], 'empty-tip', '暂无未背书学生');
                renderList(queueList, queueFilter, 'queue', [{ text: '回到未背书', action: 'toNoRecite', cls: 'btn-secondary' },{ text: '开始背书', action: 'toReciting', cls: 'btn-warning' },{ text: '标记完成', action: 'toDone', cls: 'btn-success' },{ text: '删除', action: 'delete', cls: 'btn-danger' }], 'empty-tip', '暂无排队学生');
                renderList(recitingList, classInfo.reciting, 'reciting', [{ text: '回到排队', action: 'toQueue', cls: 'btn-info' },{ text: '标记完成', action: 'toDone', cls: 'btn-success' },{ text: '删除', action: 'delete', cls: 'btn-danger' },{ text: '备注', action: 'remark', cls: 'btn-secondary' }], 'empty-tip-now', '暂无正在背书学生');
                renderList(doneList, doneFilter, 'done', [{ text: '回到未背书', action: 'toNoRecite', cls: 'btn-secondary' },{ text: '删除', action: 'delete', cls: 'btn-danger' }], 'empty-tip', '暂无已完成学生');
            }
            
            function renderList(container, data, type, actions, emptyClass, emptyText) {
                if (!data.length) { container.innerHTML = `<div class="${emptyClass}">${emptyText}</div>`; return; }
                container.innerHTML = '';
                data.forEach((item, idx) => {
                    const div = document.createElement("div");
                    div.className = type === 'reciting' ? 'now-item' : 'student-item';
                    let remarkHtml = item.remark ? `<span class="student-remark">📝 ${item.remark}</span>` : '';
                    div.innerHTML = `<div class="student-info"><div class="student-name">${item.name}</div><div class="student-num">学号：${item.num}</div>${remarkHtml}</div><div class="student-actions">${actions.map(act => `<button class="${act.cls}" data-action="${act.action}" data-index="${idx}">${act.text}</button>`).join('')}</div>`;
                    div.querySelectorAll('button').forEach(btn => btn.addEventListener('click', (e) => { const action = e.target.dataset.action; const index = parseInt(e.target.dataset.index); handleStudentAction(type, action, index, data); }));
                    container.appendChild(div);
                });
            }
            
            function handleStudentAction(fromType, action, filterIndex, filteredArray) {
                const classInfo = classData[currentClass];
                const student = filteredArray[filterIndex];
                let realIndex = -1;
                const sourceArray = classInfo[fromType];
                for (let i = 0; i < sourceArray.length; i++) { if (sourceArray[i].num === student.num && sourceArray[i].name === student.name) { realIndex = i; break; } }
                if (realIndex === -1) return;
                if (action === 'delete') { if (!confirm(`删除${student.name}？`)) return; sourceArray.splice(realIndex, 1); }
                else if (action === 'remark') { let remark = prompt("请输入备注文字", student.remark || ""); if (remark !== null) student.remark = remark.trim() || undefined; }
                else {
                    let toType = '';
                    if (action === 'toNoRecite') toType = 'noRecite';
                    else if (action === 'toQueue') toType = 'queue';
                    else if (action === 'toReciting') toType = 'reciting';
                    else if (action === 'toDone') toType = 'done';
                    if (toType) { sourceArray.splice(realIndex, 1); classInfo[toType].push(student); }
                }
                if (classInfo.noRecite) classInfo.noRecite = sortByNum(classInfo.noRecite);
                if (classInfo.queue) classInfo.queue = sortByNum(classInfo.queue);
                if (classInfo.reciting) classInfo.reciting = sortByNum(classInfo.reciting);
                if (classInfo.done) classInfo.done = sortByNum(classInfo.done);
                saveData(); renderStudentList(); updateStats(); checkReminder(); renderRandomPanel();
            }
            
            function updateStats() { 
                if (!currentClass) { totalNum.textContent='0';noReciteNum.textContent='0';queueNum.textContent='0';recitingNum.textContent='0';doneNum.textContent='0';noReciteCount.textContent='0人';queueCount.textContent='0人';recitingCount.textContent='0人';doneCount.textContent='0人'; return; }
                const c = classData[currentClass];
                totalNum.textContent = c.noRecite.length+c.queue.length+c.reciting.length+c.done.length;
                noReciteNum.textContent = c.noRecite.length; queueNum.textContent = c.queue.length; recitingNum.textContent = c.reciting.length; doneNum.textContent = c.done.length;
                noReciteCount.textContent = c.noRecite.length+'人'; queueCount.textContent = c.queue.length+'人'; recitingCount.textContent = c.reciting.length+'人'; doneCount.textContent = c.done.length+'人';
            }
            
            function checkReminder() { 
                reminderBox.innerHTML = ''; if (!currentClass) return; const n = classData[currentClass].noRecite.length; if (n>0) { let d = document.createElement("div"); d.className="reminder"; d.textContent=`⚠️ 当前有${n}名学生未开始背书`; reminderBox.appendChild(d); } 
            }
            
            function renderRecordTabs() { 
                recordTabs.innerHTML=''; if (!currentClass||!recordData[currentClass]?.length) { recordContent.innerHTML='<div class="empty-tip">暂无记录</div>'; return; }
                recordData[currentClass].forEach((r,i) => { let tab = document.createElement('div'); tab.className=`record-tab ${i===0?'active':''}`; tab.dataset.recordId=r.id; tab.textContent = r.customName || `${r.date} ${r.time}`; tab.addEventListener('click',()=>{ document.querySelectorAll('.record-tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); currentRecordId=r.id; renderRecordContent(); }); recordTabs.appendChild(tab); });
                currentRecordId = recordData[currentClass][0].id; renderRecordContent();
            }
            function renderRecordContent() { if (!currentClass||!recordData[currentClass]) return; let rec = recordData[currentClass].find(r=>r.id===currentRecordId); if(!rec) return; let html = `<div><strong>班级 ${rec.className} ${rec.date} ${rec.time}</strong> 总${rec.total} 完成${rec.done} 未完成${rec.unfinished}</div>`; if (rec.picked?.length) html += `<div><strong>抽取名单：</strong> ${rec.picked.map(p=>`${p.name}(${p.num})`).join('、')}</div>`; html += `<br>✅已完成：${rec.details.done.map(d=>`${d.name}(${d.num})`).join('、')}`; if (rec.details.noRecite?.length) html += `<br>⏳未背书：${rec.details.noRecite.map(d=>`${d.name}(${d.num})`).join('、')}`; if (rec.details.queue?.length) html += `<br>🔄排队中：${rec.details.queue.map(d=>`${d.name}(${d.num})`).join('、')}`; if (rec.details.reciting?.length) html += `<br>📖正在背书：${rec.details.reciting.map(d=>`${d.name}(${d.num})`).join('、')}`; recordContent.innerHTML = html; }
            function clearRecords() { if (!currentClass) return; if (confirm(`清空${currentClass}记录？`)) { delete recordData[currentClass]; saveData(); renderRecordTabs(); } }
            function renderRandomPanel() { if (!currentClass) return; const noRecite = classData[currentClass]?.noRecite || []; randomLeftCount.textContent = `(${noRecite.length}人)`; randomLeftList.innerHTML = ''; noRecite.forEach((stu, idx) => { const alreadyDrawn = drawnStudents.some(d => d.num === stu.num && d.name === stu.name); const item = document.createElement('div'); item.className = 'random-student-item'; item.innerHTML = `<span>${stu.name} (${stu.num})</span><button class="random-add-btn" data-idx="${idx}" ${alreadyDrawn ? 'disabled' : ''}>${alreadyDrawn ? '已抽取' : '➕加入抽取'}</button>`; item.querySelector('button')?.addEventListener('click', () => { if (!alreadyDrawn) { drawnStudents.push({ name: stu.name, num: stu.num }); renderRandomPanel(); renderDrawnList(); } }); randomLeftList.appendChild(item); }); renderDrawnList(); }
            function renderDrawnList() { randomDrawnList.innerHTML = drawnStudents.map(s => `<span class="random-drawn-tag">${s.name}(${s.num})</span>`).join(''); drawnCountSpan.textContent = drawnStudents.length; }
            function doRandom() { const noRecite = classData[currentClass]?.noRecite || []; if (!noRecite.length) return alert('未背书列表为空'); let count = parseInt(randomCountInput.value); if (isNaN(count) || count < 1) count = 1; const available = noRecite.filter(s => !drawnStudents.some(d => d.num === s.num && d.name === s.name)); if (available.length === 0) return alert('所有未背书学生均已抽取'); count = Math.min(count, available.length); const shuffled = [...available].sort(() => Math.random() - 0.5); const picked = shuffled.slice(0, count); picked.forEach(p => drawnStudents.push({ name: p.name, num: p.num })); renderRandomPanel(); renderDrawnList(); }
            function replaceNoReciteByDrawn() { if (!currentClass) return; if (!drawnStudents.length) return alert('抽取名单为空，无法替换'); const classInfo = classData[currentClass]; classInfo.noRecite = drawnStudents.map(s => ({ ...s })); if (classInfo.noRecite.length) { classInfo.maxNum = Math.max(...classInfo.noRecite.map(s => s.num)); } saveData(); renderStudentList(); updateStats(); checkReminder(); renderRandomPanel(); alert(`未背书列表已被抽取的 ${drawnStudents.length} 人替换。`); }
            function clearDrawn() { drawnStudents = []; renderRandomPanel(); renderDrawnList(); }
            
            function generateSyncKey() {
                if (Object.keys(classData).length === 0) { alert('请先创建班级再生成同步密钥'); return; }
                try { const syncData = { classData, recordData, version: '1.0', timestamp: new Date().toISOString() }; const jsonStr = JSON.stringify(syncData); const compressed = btoa(encodeURIComponent(jsonStr)); navigator.clipboard.writeText(compressed).then(() => alert('✅ 同步密钥已复制到剪贴板！')).catch(() => prompt('请手动复制下面的密钥：', compressed)); } catch (error) { alert('生成密钥失败：' + error.message); }
            }
            function parseSyncKey() { const key = syncKeyInput.value.trim(); if (!key) { alert('请输入同步密钥'); return; } try { const jsonStr = decodeURIComponent(atob(key)); const syncData = JSON.parse(jsonStr); if (!syncData.classData || !syncData.recordData) throw new Error('无效的同步数据格式'); const classCount = Object.keys(syncData.classData).length; const recordCount = Object.keys(syncData.recordData).length; const currentClassCount = Object.keys(classData).length; syncPreviewInfo.innerHTML = `<strong>发现同步数据：</strong><br>📁 ${classCount} 个班级<br>📝 ${recordCount} 条背书记录<br><span style="color: #4f46e5;">当前设备有 ${currentClassCount} 个班级</span><br>请选择同步方式：`; pendingSyncData = syncData; syncConfirmArea.style.display = "block"; } catch (error) { alert('❌ 密钥解析失败：' + error.message); } }
            function applySyncData(mode) { if (!pendingSyncData) return; try { if (mode === 'overwrite') { classData = pendingSyncData.classData; recordData = pendingSyncData.recordData; alert('✅ 已覆盖当前数据'); } else { const mergedClassData = { ...classData }; Object.entries(pendingSyncData.classData).forEach(([className, classInfo]) => { if (!mergedClassData[className]) mergedClassData[className] = classInfo; }); const mergedRecordData = { ...recordData }; Object.entries(pendingSyncData.recordData).forEach(([className, records]) => { if (!mergedRecordData[className]) mergedRecordData[className] = records; else { const existingIds = new Set(mergedRecordData[className].map(r => r.id)); const newRecords = records.filter(r => !existingIds.has(r.id)); mergedRecordData[className] = [...mergedRecordData[className], ...newRecords].slice(0, 15); } }); classData = mergedClassData; recordData = mergedRecordData; alert('✅ 数据合并完成'); } saveData(); syncInputArea.style.display = "none"; syncConfirmArea.style.display = "none"; syncKeyInput.value = ""; pendingSyncData = null; renderClassTabs(); checkClassExists(); renderStudentList(); updateStats(); checkReminder(); renderRecordTabs(); renderRandomPanel(); } catch (error) { alert('❌ 同步失败：' + error.message); } }
            
            function attachEvents() {
                document.querySelector('.file-upload-btn')?.addEventListener('click', (e) => { e.preventDefault(); excelFile.click(); });
                excelFile.addEventListener("change", function() { fileName.textContent = this.files?.[0]?.name || "未选择文件"; });
                addClassBtn.addEventListener("click", addClass);
                classTabs.addEventListener("click", (e) => { 
                    if (e.target.classList.contains("class-tab") && !e.target.classList.contains("delete-class-btn")) { 
                        currentClass = e.target.dataset.class; 
                        renderClassTabs(); 
                        renderStudentList(); 
                        updateStats(); 
                        checkReminder(); 
                        renderRandomPanel(); 
                    } 
                });
                studentName.addEventListener("keypress", (e) => { if (e.key === "Enter") addStudent(); });
                addStudentBtn.addEventListener("click", addStudent);
                importExcelBtn.addEventListener("click", importExcel);
                exportExcelBtn.addEventListener("click", exportExcel);
                resetBtn.addEventListener("click", resetClass);
                clearAllBtn.addEventListener("click", clearAll);
                searchNoRecite.addEventListener("input", renderStudentList);
                searchQueue.addEventListener("input", renderStudentList);
                searchDone.addEventListener("input", renderStudentList);
                endTaskBtn.addEventListener("click", endTask);
                clearRecordsBtn.addEventListener("click", clearRecords);
                doRandomBtn.addEventListener("click", doRandom);
                replaceByRandomBtn.addEventListener("click", replaceNoReciteByDrawn);
                clearDrawnBtn.addEventListener("click", clearDrawn);
                generateSyncKeyBtn.addEventListener("click", generateSyncKey);
                showSyncInputBtn.addEventListener("click", () => { syncInputArea.style.display = "block"; syncKeyInput.focus(); });
                cancelSyncBtn.addEventListener("click", () => { syncInputArea.style.display = "none"; syncKeyInput.value = ""; syncConfirmArea.style.display = "none"; pendingSyncData = null; });
                importSyncKeyBtn.addEventListener("click", parseSyncKey);
                cancelConfirmSync.addEventListener("click", () => { syncConfirmArea.style.display = "none"; pendingSyncData = null; });
                confirmOverwriteSync.addEventListener("click", () => applySyncData('overwrite'));
                confirmMergeSync.addEventListener("click", () => applySyncData('merge'));
            }
            
            function init() { renderClassTabs(); checkClassExists(); renderStudentList(); updateStats(); checkReminder(); renderRecordTabs(); renderRecordContent(); attachEvents(); if (currentClass) renderRandomPanel(); }
            init();
        })();
    </script>
</body>
</html>
